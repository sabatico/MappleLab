{% extends "base.html" %}

{% block title %}Set Password — Orchard UI{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0"><i class="bi bi-shield-lock"></i> Set Password</h4>
            </div>
            <div class="card-body">
                <p class="text-muted small">Account: {{ user.email or user.username }}</p>
                <form method="POST">
                    <div class="mb-3">
                        <label for="password" class="form-label">New password</label>
                        <input type="password" class="form-control" id="password" name="password"
                               required minlength="8" autocomplete="new-password">
                    </div>
                    <div class="mb-3">
                        <label for="confirm_password" class="form-label">Confirm password</label>
                        <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                               required minlength="8" autocomplete="new-password">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-check-circle"></i> Save Password
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
