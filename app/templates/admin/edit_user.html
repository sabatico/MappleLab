{% extends "base.html" %}

{% block title %}Edit User — Orchard UI{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
        <div class="card">
            <div class="card-header">
                Edit User — {{ user.email or user.username }}
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Role</label>
                        <select name="role" class="form-select">
                            <option value="user" {{ 'selected' if not user.is_admin else '' }}>User</option>
                            <option value="admin" {{ 'selected' if user.is_admin else '' }}>Admin</option>
                        </select>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">Active VM limit</label>
                            <input type="number" min="1" class="form-control"
                                   name="max_active_vms" value="{{ user.max_active_vms }}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Inactive VM limit</label>
                            <input type="number" min="1" class="form-control"
                                   name="max_saved_vms" value="{{ user.max_saved_vms }}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Disk quota (GB)</label>
                            <input type="number" min="1" class="form-control"
                                   name="disk_quota_gb" value="{{ user.disk_quota_gb }}">
                        </div>
                    </div>
                    <div class="mt-4 d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Save</button>
                        <a class="btn btn-outline-secondary" href="{{ url_for('admin.users') }}">Back</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
